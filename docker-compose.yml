version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: deke_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deke_db
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - deke_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: deke_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - deke_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deke_backend
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - deke_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deke_frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - deke_network

volumes:
  postgres_data:
  redis_data:

networks:
  deke_network:
    driver: bridge
