version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexu_postgres_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexu_db
    ports:
      - '5434:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - nexu_network_dev

  redis:
    image: redis:7-alpine
    container_name: nexu_redis_dev
    ports:
      - '6379:6379'
    volumes:
      - redis_data_dev:/data
    command: redis-server --appendonly yes
    networks:
      - nexu_network_dev

  minio:
    image: minio/minio:latest
    container_name: nexu_minio_dev
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'  # API
      - '9001:9001'  # Console
    volumes:
      - minio_data_dev:/data
    command: server /data --console-address ":9001"
    networks:
      - nexu_network_dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Создание bucket при старте
  minio-create-bucket:
    image: minio/mc:latest
    container_name: nexu_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/nexu-images --ignore-existing;
      /usr/bin/mc anonymous set public myminio/nexu-images;
      echo 'MinIO bucket created successfully!';
      "
    networks:
      - nexu_network_dev

volumes:
  postgres_data_dev:
  redis_data_dev:
  minio_data_dev:

networks:
  nexu_network_dev:
    driver: bridge
